<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06090b">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#06090b">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#06090b">
<title>KrispyKP // Redirecting</title>
<link rel="stylesheet" href="site.css">
</head>
<body>
<div class="radar-grid" aria-hidden="true"></div>
<div class="radar-blips" aria-hidden="true"></div>
<div class="radar-vignette" aria-hidden="true"></div>
<div class="shell radar">
  <main class="page-hero">
    <div class="container">
      <div class="frame panel">
        <div class="section-title">Redirect</div>
        <h1 class="h1">Moving to Tournaments</h1>
        <p class="sub">The old projects route now points to the tournaments page.</p>
        <div class="cta-row">
          <a class="btn primary" href="tournaments.html">Open Tournaments</a>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  const layer = document.querySelector(".radar-blips");
  if (!layer) return;

  const SWEEP_DURATION_MS = 4200;
  const BLIP_COUNT = 14;
  const ANGLE_TRIGGER_WINDOW = 5; // degrees
  const blips = [];

  function normalizeAngle(deg) {
    return ((deg % 360) + 360) % 360;
  }

  function angleDelta(a, b) {
    const diff = Math.abs(normalizeAngle(a) - normalizeAngle(b));
    return Math.min(diff, 360 - diff);
  }

  function createBlip() {
    const el = document.createElement("div");
    el.className = "radar-blip";

    const x = 10 + Math.random() * 80;
    const y = 10 + Math.random() * 80;

    el.style.left = x + "%";
    el.style.top = y + "%";

    layer.appendChild(el);

    const dx = x - 50;
    const dy = y - 50;

    // Convert position to radar angle, where 0deg is up and rotation is clockwise
    const angle = normalizeAngle((Math.atan2(dy, dx) * 180 / Math.PI) + 90);

    blips.push({
      el,
      x,
      y,
      angle,
      lastTriggeredSweep: -1
    });
  }

  function triggerBlip(blip, sweepIndex) {
    blip.lastTriggeredSweep = sweepIndex;
    blip.el.classList.remove("active");
    void blip.el.offsetWidth;
    blip.el.classList.add("active");
  }

  for (let i = 0; i < BLIP_COUNT; i += 1) {
    createBlip();
  }

  function tick() {
    const now = performance.now();
    const progress = (now % SWEEP_DURATION_MS) / SWEEP_DURATION_MS;
    const sweepAngle = normalizeAngle(progress * 360);
    const sweepIndex = Math.floor(now / SWEEP_DURATION_MS);

    for (const blip of blips) {
      if (
        angleDelta(sweepAngle, blip.angle) <= ANGLE_TRIGGER_WINDOW &&
        blip.lastTriggeredSweep !== sweepIndex
      ) {
        triggerBlip(blip, sweepIndex);
      }
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

</body>
</html>
