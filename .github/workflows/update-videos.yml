name: Update YouTube Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  update-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate video data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-youtube-playlists.mjs

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.generated.js
          git diff --cached --quiet || git commit -m "Update YouTube video data"
          git push